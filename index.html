<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Endless Heroes</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cinzel', 'Noto Sans TC', serif; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
body { background: #000; overflow: hidden; touch-action: none; }
#game-container { position: absolute; overflow: hidden; }
canvas { display: block; position: absolute; top: 0; left: 0; }
#bg-canvas { z-index: 0; }
#game { z-index: 1; }
#ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; font-family: 'Segoe UI', sans-serif; color: #fff; z-index: 2; }
#hud { display: flex; justify-content: space-between; padding: 10px 15px; align-items: center; }
#hud > div { text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 0 5px #000; font-size: 14px; }
#hp-bar { width: 200px; height: 16px; background: #333; border-radius: 8px; overflow: hidden; border: 1px solid #555; }
#hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6666); transition: width 0.2s; }
#xp-bar { width: 100%; height: 8px; background: #222; }
#xp-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #44ffaa); transition: width 0.2s; }
#level-up { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: all; text-align: center; z-index: 10; }
#level-up h2 { font-size: 28px; margin-bottom: 20px; color: #ffdd44; text-shadow: 0 0 10px #ffdd44; }
.upgrade-btn { display: block; width: 280px; margin: 10px auto; padding: 15px; background: rgba(30,30,60,0.95); border: 2px solid #5555ff; border-radius: 10px; color: #fff; font-size: 15px; cursor: pointer; transition: all 0.2s; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
.upgrade-btn:hover { background: rgba(50,50,100,0.95); border-color: #8888ff; transform: scale(1.05); }
.upgrade-btn { touch-action: manipulation; -webkit-tap-highlight-color: rgba(255,255,255,0.2); user-select: none; -webkit-user-select: none; }
#game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: all; z-index: 10; background: rgba(30,30,60,0.8); border: 2px solid #4488ff; border-radius: 16px; padding: 30px 40px; min-width: 280px; box-shadow: 0 0 30px rgba(68,136,255,0.3); }
#game-over h1 { font-size: 48px; color: #ff4444; text-shadow: 0 0 20px #ff0000; }
#game-over p { font-size: 20px; margin: 15px 0; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
#game-over button { padding: 12px 30px; font-size: 18px; background: #4444ff; border: none; color: #fff; border-radius: 8px; cursor: pointer; }
#leaderboard { display: none; margin-top: 15px; text-align: left; font-size: 14px; }
#leaderboard h3 { text-align: center; margin-bottom: 8px; }
#leaderboard ol { padding-left: 20px; }
#leaderboard li { margin: 4px 0; }
#pause-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; color: #fff; text-shadow: 0 0 20px #fff; z-index: 5; }
#boss-warning { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 52px; color: #ff0000; text-shadow: 0 0 30px #ff0000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; font-weight: bold; pointer-events: none; z-index: 4; -webkit-text-stroke: 2px #000; }
#level-clear { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: all; z-index: 10; }
#level-clear h2 { font-size: 36px; color: #ffdd44; text-shadow: 0 0 15px #ffdd44; margin-bottom: 20px; }
#skill-icons { position: absolute; bottom: 15px; left: 15px; font-size: 20px; z-index: 3; }
.skill-icon { margin-right: 4px; position: relative; }
.skill-icon sub { font-size: 10px; position: absolute; bottom: -2px; right: -4px; color: #ffdd44; }
#level-name { position: absolute; top: 38px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.6); }
#mute-indicator { position: absolute; top: 10px; right: 15px; font-size: 18px; pointer-events: all; cursor: pointer; }
#joystick { display: none; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); z-index: 3; }
#joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; margin: -25px; border-radius: 50%; background: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="game"></canvas>
<div id="game-container">
<div id="ui">
  <div id="xp-bar"><div id="xp-fill"></div></div>
  <div id="game-timer" style="position:absolute; top:12px; left:50%; transform:translateX(-50%); font-size:14px; color:rgba(255,255,255,0.7); z-index:3; pointer-events:none;"></div>
  <div id="hud">
    <div id="hud-stats" style="font-size:12px; color:rgba(255,255,255,0.7); line-height:1.6;"></div>
  </div>
  <div id="level-name"></div>
  <span id="mute-indicator">🔊</span>
</div>
<div id="level-up"><h2>LEVEL UP!</h2><div id="choices"></div></div>
<div id="game-over"><h1>GAME OVER</h1><p id="final-stats"></p><div id="leaderboard"></div><button onclick="location.reload()">Retry</button></div>
<div id="level-clear"></div>
<div id="pause-overlay">PAUSED</div>
<div id="rush-warning" style="display:none; position:absolute; top:10%; left:50%; transform:translateX(-50%); font-size:28px; color:#ff4444; text-shadow:0 0 15px #ff0000; font-weight:bold; pointer-events:none; z-index:4;">⚠️ RUSH WAVE! ⚠️</div>
<div id="boss-warning">⚠ BOSS INCOMING! ⚠</div>
<div id="skill-icons"></div>
<button id="settings-btn" style="position:absolute; top:55px; right:10px; z-index:100; background:rgba(0,0,0,0.5); border:1px solid #666; border-radius:50%; width:36px; height:36px; font-size:18px; cursor:pointer; color:#ccc;">⚙</button>
<div id="settings-menu" style="display:none; position:absolute; inset:0; z-index:200; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center;">
  <div style="background:#1a1a2e; border:2px solid #4488ff; border-radius:12px; padding:30px 40px; text-align:center; color:#eee;">
    <h3 style="margin-top:0;">⚙ 設定</h3>
    <div style="margin:14px 0;"><label><input type="checkbox" id="set-bgm" checked> 🎵 背景音樂</label></div>
    <div style="margin:14px 0;"><label><input type="checkbox" id="set-sfx" checked> 🔊 音效</label></div>
    <div style="margin:14px 0;"><label><input type="checkbox" id="set-hitbox"> 🎯 Hitbox 顯示</label></div>
    <button id="set-resume" style="margin-top:16px; padding:10px 30px; background:#4488ff; border:none; border-radius:6px; color:#fff; font-size:16px; cursor:pointer;">▶ 繼續遊戲</button>
  </div>
</div>
<div id="meta-shop" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:#fff; font-family:Segoe UI,sans-serif; z-index:21; pointer-events:all; background:rgba(0,0,0,0.9); padding:30px; border-radius:15px; border:2px solid #ffcc00;"></div>
<div id="character-select" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; color:#fff; font-family:Segoe UI,sans-serif; z-index:20; pointer-events:all; background:url('assets/ui/title_bg.jpg') center/cover no-repeat #000; overflow-y:auto; padding:20px 0;"></div>
<div id="bomb-btn" style="display:none;"></div>
<div id="joystick"><div id="joystick-knob"></div></div>
</div><!-- /game-container -->

<!-- 依序載入模組（相容 file:// 協議） -->
<script>document.addEventListener('contextmenu',function(e){e.preventDefault()});document.addEventListener('selectstart',function(e){e.preventDefault()});</script>
<script src="config.js"></script>
<script src="js/utils.js"></script>
<script src="js/object-pool.js"></script>
<script src="js/spatial-hash.js"></script>
<script src="js/input.js"></script>
<script src="js/sprite-animator.js"></script>
<script src="js/player.js"></script>
<script src="js/particle.js"></script>
<script src="js/xp-gem.js"></script>
<script src="js/projectile.js"></script>
<script src="js/enemy.js"></script>
<script src="js/boss.js"></script>
<script src="js/wave-manager.js"></script>
<script src="js/weapons.js"></script>
<script src="js/skill-tree.js"></script>
<script src="js/level-manager.js"></script>
<script src="js/audio.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/character-select.js"></script>
<script src="js/damage-numbers.js"></script>
<script src="js/level-up-effect.js"></script>
<script src="js/hardcore-vfx.js"></script>
<script src="js/passive-items.js"></script>
<script src="js/rush-wave.js"></script>
<script src="js/elite-spawner.js"></script>
<script src="js/combo-system.js"></script>
<script src="js/bomb-system.js"></script>
<script src="js/meta-progression.js"></script>
<script src="js/melee-attack.js"></script>
<script src="js/valkyrie-attack.js"></script>
<script src="js/archer-attack.js"></script>
<script src="js/renderer.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script>
// 啟動遊戲
new SG.Game();
</script>
</body>
</html>
