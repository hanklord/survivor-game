<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vampire Survivors Clone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; touch-action: none; }
canvas { display: block; position: absolute; top: 0; left: 0; }
#bg-canvas { z-index: 0; }
#game { z-index: 1; }
#ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; font-family: 'Segoe UI', sans-serif; color: #fff; z-index: 2; }
#hud { display: flex; justify-content: space-between; padding: 10px 15px; align-items: center; }
#hud > div { text-shadow: 0 0 5px #000; font-size: 14px; }
#hp-bar { width: 200px; height: 16px; background: #333; border-radius: 8px; overflow: hidden; border: 1px solid #555; }
#hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6666); transition: width 0.2s; }
#xp-bar { width: 100%; height: 8px; background: #222; }
#xp-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #44ffaa); transition: width 0.2s; }
#level-up { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: all; text-align: center; z-index: 10; }
#level-up h2 { font-size: 28px; margin-bottom: 20px; color: #ffdd44; text-shadow: 0 0 10px #ffdd44; }
.upgrade-btn { display: block; width: 280px; margin: 10px auto; padding: 15px; background: rgba(30,30,60,0.95); border: 2px solid #5555ff; border-radius: 10px; color: #fff; font-size: 15px; cursor: pointer; transition: all 0.2s; }
.upgrade-btn:hover { background: rgba(50,50,100,0.95); border-color: #8888ff; transform: scale(1.05); }
#game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: all; z-index: 10; }
#game-over h1 { font-size: 48px; color: #ff4444; text-shadow: 0 0 20px #ff0000; }
#game-over p { font-size: 20px; margin: 15px 0; }
#game-over button { padding: 12px 30px; font-size: 18px; background: #4444ff; border: none; color: #fff; border-radius: 8px; cursor: pointer; }
#leaderboard { display: none; margin-top: 15px; text-align: left; font-size: 14px; }
#leaderboard h3 { text-align: center; margin-bottom: 8px; }
#leaderboard ol { padding-left: 20px; }
#leaderboard li { margin: 4px 0; }
#pause-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; color: #fff; text-shadow: 0 0 20px #fff; z-index: 5; }
#boss-warning { display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 52px; color: #ff0000; text-shadow: 0 0 30px #ff0000; font-weight: bold; pointer-events: none; z-index: 4; }
#level-clear { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: all; z-index: 10; }
#level-clear h2 { font-size: 36px; color: #ffdd44; text-shadow: 0 0 15px #ffdd44; margin-bottom: 20px; }
#skill-icons { position: absolute; bottom: 15px; left: 15px; font-size: 20px; z-index: 3; }
.skill-icon { margin-right: 4px; position: relative; }
.skill-icon sub { font-size: 10px; position: absolute; bottom: -2px; right: -4px; color: #ffdd44; }
#level-name { position: absolute; top: 38px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,0.6); }
#mute-indicator { position: absolute; top: 10px; right: 15px; font-size: 18px; pointer-events: all; cursor: pointer; }
#joystick { display: none; position: absolute; bottom: 80px; left: 80px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); z-index: 3; }
#joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; margin: -25px; border-radius: 50%; background: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<canvas id="game"></canvas>
<div id="ui">
  <div id="xp-bar"><div id="xp-fill"></div></div>
  <div id="hud">
    <div><div id="hp-bar"><div id="hp-fill"></div></div><span id="hp-text">100/100</span></div>
    <div id="timer">0:00</div>
    <div>Lv.<span id="level">1</span> | Kills: <span id="kills">0</span></div>
  </div>
  <div id="level-name"></div>
  <span id="mute-indicator">🔊</span>
</div>
<div id="level-up"><h2>LEVEL UP!</h2><div id="choices"></div></div>
<div id="game-over"><h1>GAME OVER</h1><p id="final-stats"></p><div id="leaderboard"></div><button onclick="location.reload()">Retry</button></div>
<div id="level-clear"></div>
<div id="pause-overlay">PAUSED</div>
<div id="boss-warning">⚠ BOSS INCOMING! ⚠</div>
<div id="skill-icons"></div>
<div id="character-select" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:#fff; font-family:Segoe UI,sans-serif; z-index:20; pointer-events:all;"></div>
<div id="joystick"><div id="joystick-knob"></div></div>

<!-- 依序載入模組（相容 file:// 協議） -->
<script src="config.js"></script>
<script src="js/utils.js"></script>
<script src="js/object-pool.js"></script>
<script src="js/spatial-hash.js"></script>
<script src="js/input.js"></script>
<script src="js/sprite-animator.js"></script>
<script src="js/player.js"></script>
<script src="js/particle.js"></script>
<script src="js/xp-gem.js"></script>
<script src="js/projectile.js"></script>
<script src="js/enemy.js"></script>
<script src="js/boss.js"></script>
<script src="js/wave-manager.js"></script>
<script src="js/weapons.js"></script>
<script src="js/skill-tree.js"></script>
<script src="js/level-manager.js"></script>
<script src="js/audio.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/character-select.js"></script>
<script src="js/damage-numbers.js"></script>
<script src="js/melee-attack.js"></script>
<script src="js/renderer.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
<script>
// 啟動遊戲
new SG.Game();
</script>
</body>
</html>
